<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>画像スライドパズル | Picture-Sliding-Puzzle</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 5px;
    font-family: sans-serif;
  }

  h1 {
    margin-bottom: 10px;
  }

  #controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
    position: relative;
    z-index: 10;
  }

  #board {
    display: grid;
    gap: 1px;
    margin: 20px auto;
  }

.tile {
    cursor: pointer;
    position: relative;
    background-repeat: no-repeat;
    border: 1px solid rgba(255,255,255,0.4); /* ← これを追加 */
}

  .empty {
    background: #fff;
    cursor: default;
  }

  .correct {
    outline: 3px solid rgba(0, 255, 0, 0.7);
  }

  button, select, label, input[type="file"] {
    padding: 6px 10px;
    font-size: 14px;
    margin: 2px;
  }

  .tile-number {
    position: absolute;
    top: 3px;
    left: 5px;
    font-size: 16px;
    font-weight: bold;
    color: rgba(255, 255, 255, 0.8);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
    pointer-events: none;
  }

  #mainArea {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  #previewContainer {
    text-align: center;
    font-size: 14px;
  }

  #previewImage {
    max-width: 200px;
    height: auto;
    border: 1px solid #ccc;
  }

  @media (max-width: 600px) {
    #mainArea {
      flex-direction: column;
      align-items: center;
    }
    #previewImage {
      max-width: 60vw;
    }
  }

  /* アシスト設定プルダウン */
  #assistDropdown {
    position: relative;
    display: inline-block;
  }

  #assistToggle {
    padding: 6px 10px;
    font-size: 14px;
  }

  #assistMenu {
    position: absolute;
    top: 32px;
    left: 0;
    background: #fff;
    border: 1px solid #ccc;
    padding: 8px 12px;
    border-radius: 4px;
    z-index: 9999;
    width: 180px;
  }

  #assistMenu.hidden {
    display: none;
  }

  #assistMenu label {
    display: block;
    font-size: 13px;
    margin-bottom: 4px;
  }
</style>
</head>

<body>

<h1>画像スライドパズル | Picture-Sliding-Puzzle</h1>

<div id="controls">

  <!-- ▼ タイム・手数（ここに1回だけ置く） -->
  <div>
    経過時間：<span id="timeDisplay">00:00</span>
  </div>

  <div>
    手数：<span id="moveCount">0</span>
  </div>

  <!-- ▼ 分割数 -->
  <div>
    <label>分割数：
      <select id="sizeSelect">
        <option value="3">3 × 3</option>
        <option value="4" selected>4 × 4</option>
        <option value="5">5 × 5</option>
      </select>
    </label>
  </div>

  <!-- ▼ シャッフル -->
  <div>
    <button id="shuffle">シャッフル</button>
  </div>

  <!-- ▼ アシスト設定 -->
  <div id="assistDropdown">
    <button id="assistToggle">アシスト設定 ▼</button>
    <div id="assistMenu" class="hidden">
      <label><input type="checkbox" id="assistPreview" checked> プレビュー表示</label>
      <label><input type="checkbox" id="assistOverlay" checked> 数字オーバーレイ</label>
      <label><input type="checkbox" id="assistHighlight"> 正しい位置ハイライト</label>
    </div>
  </div>

  <!-- ▼ 自分の画像 + プリセット -->
  <div style="display:flex; gap:10px; align-items:center;">
    <label>
      自分の画像を選ぶ：
      <input type="file" id="imageInput" accept="image/*">
    </label>

    <label>
      プリセット画像：
      <select id="presetSelector">
        <option value="">選択してください</option>
      </select>
    </label>
  </div>

</div>


<div id="mainArea">
  <div id="board"></div>

  <div id="previewContainer">
    <p>完成画像プレビュー</p>
    <img id="previewImage" src="puzzle.jpg" alt="プレビュー">
  </div>

  <!-- ★最終配置 -->
  <div id="bestRecordArea"
       style="margin-top:15px;
              font-size:14px;
              background:#f9f9f9;
              border:1px solid #ccc;
              padding:6px;
              position:relative;">
  </div>
</div>


<!-- ★ ここを追加する！ -->
<div id="bestRecordArea"
     style="position:fixed;
            bottom:20px;
            left:20px;
            background:#fff;
            border:1px solid #ccc;
            padding:6px;
            z-index:99999;">
</div>

<div id="counter"></div>


<script>
/* プルダウン */
const assistDropdown = document.getElementById("assistDropdown");
const assistToggle = document.getElementById("assistToggle");
const assistMenu = document.getElementById("assistMenu");

assistToggle.addEventListener("click", (e) => {
  e.stopPropagation();
  assistMenu.classList.toggle("hidden");
});
assistMenu.addEventListener("click", (e) => e.stopPropagation());
document.addEventListener("click", () => assistMenu.classList.add("hidden"));

/* プリセット画像100枠を自動生成（存在チェック＋昇順ソート） */
const presetSelector = document.getElementById("presetSelector");
let presetList = [];
let checkedCount = 0;

for (let i = 1; i <= 100; i++) {
  const filename = `preset${i}.jpg`;
  const img = new Image();
  img.src = filename;

  img.onload = () => {
    presetList.push({ index: i, file: filename });
    checkedCount++;
    if (checkedCount === 100) finalizePresetList();
  };

  img.onerror = () => {
    checkedCount++;
    if (checkedCount === 100) finalizePresetList();
  };
}

function finalizePresetList() {
  // 昇順にソート
  presetList.sort((a, b) => a.index - b.index);

  // option を追加
  presetList.forEach(item => {
    const opt = document.createElement("option");
    opt.value = item.file;
    opt.textContent = `プリセット ${item.index}`;
    presetSelector.appendChild(opt);
  });
}


/* パズル本体 */
const board = document.getElementById("board");
const shuffleBtn = document.getElementById("shuffle");
const sizeSelect = document.getElementById("sizeSelect");
const imageInput = document.getElementById("imageInput");
const previewImage = document.getElementById("previewImage");

const assistPreview = document.getElementById("assistPreview");
const assistOverlay = document.getElementById("assistOverlay");
const assistHighlight = document.getElementById("assistHighlight");

let N = parseInt(sizeSelect.value, 10);
let tiles = [];
let currentImage = "preset1.jpg";

let startTime = null;
let timerInterval = null;
let moves = 0;

let imageWidth = 400;
let imageHeight = 400;
let boardWidth = 400;
let boardHeight = 400;

/* タイマー関数 */
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const sec = Math.floor(elapsed / 1000);
    const m = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    document.getElementById("timeDisplay").textContent = `${m}:${s}`;
  }, 200);
}

function stopTimer() {
  clearInterval(timerInterval);
}

function resetTimer() {
  clearInterval(timerInterval);
  document.getElementById("timeDisplay").textContent = "00:00";
  startTime = null;
}

function resetMoves() {
  moves = 0;
  document.getElementById("moveCount").textContent = moves;
}

/* 画像読み込み */
function loadImageInfo(src) {
  const img = new Image();

  img.onerror = () => console.log("画像読み込み失敗:", src);

  img.onload = () => {
    imageWidth = img.width;
    imageHeight = img.height;
    updateBoardSize();
    renderBoard();
  };

  img.src = src;
}

/* board のサイズ調整 */
function updateBoardSize() {
  const maxW = window.innerWidth * 0.8;
  const maxH = window.innerHeight * 0.7;

  const ratio = imageHeight / imageWidth;

  let w = maxW;
  let h = w * ratio;

  if (h > maxH) {
    h = maxH;
    w = h / ratio;
  }

  boardWidth = w;
  boardHeight = h;
}

/* タイル初期化 */
function initTiles() {
  tiles = [];
  for (let i = 0; i < N * N - 1; i++) tiles.push(i);
  tiles.push(null);
}

/* 描画 */
function renderBoard() {
  updateBoardSize();

  const tileW = boardWidth / N;
  const tileH = boardHeight / N;

  board.style.width = boardWidth + "px";
  board.style.height = boardHeight + "px";
  board.style.gridTemplateColumns = `repeat(${N}, ${tileW}px)`;
  board.style.gridTemplateRows = `repeat(${N}, ${tileH}px)`;

  board.innerHTML = "";

  tiles.forEach((value, index) => {
    const div = document.createElement("div");
    div.dataset.index = index;
    div.style.width = tileW + "px";
    div.style.height = tileH + "px";

    if (value === null) {
      div.className = "tile empty";
    } else {
      div.className = "tile";

      const x = (value % N) * -tileW;
      const y = Math.floor(value / N) * -tileH;

      div.style.backgroundImage = `url(${currentImage})`;
      div.style.backgroundSize = `${boardWidth}px ${boardHeight}px`;
      div.style.backgroundPosition = `${x}px ${y}px`;

      if (assistOverlay.checked) {
        const num = document.createElement("div");
        num.className = "tile-number";
        num.textContent = value + 1;
        div.appendChild(num);
      }

      if (assistHighlight.checked && value === index) {
        div.classList.add("correct");
      }

      div.addEventListener("click", onTileClick);
    }

    board.appendChild(div);
  });

  previewImage.style.display = assistPreview.checked ? "block" : "none";
  // ★★★ これを追加 ★★★
  displayBestRecord(`${N}x${N}`, currentImage);
  
}

/* 隣接判定 */
function getNeighbors(index) {
  const neighbors = [];
  const row = Math.floor(index / N);
  const col = index % N;

  if (row > 0) neighbors.push(index - N);
  if (row < N - 1) neighbors.push(index + N);
  if (col > 0) neighbors.push(index - 1);
  if (col < N - 1) neighbors.push(index + 1);

  return neighbors;
}

/* タイルクリック */
function onTileClick(e) {
  const idx = parseInt(e.currentTarget.dataset.index, 10);
  const emptyIndex = tiles.indexOf(null);
  const neighbors = getNeighbors(idx);

  if (neighbors.includes(emptyIndex)) {
    [tiles[idx], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[idx]];
    moves++;
    document.getElementById("moveCount").textContent = moves;

    renderBoard();
    checkClear();
  }
}

/* シャッフル */
function shuffleTiles() {
  for (let i = 0; i < 300; i++) {
    const emptyIndex = tiles.indexOf(null);
    const neighbors = getNeighbors(emptyIndex);
    const moveIndex = neighbors[Math.floor(Math.random() * neighbors.length)];
    [tiles[emptyIndex], tiles[moveIndex]] = [tiles[moveIndex], tiles[emptyIndex]];
  }
  renderBoard();
}

/* クリア判定 */
function checkClear() {
  for (let i = 0; i < N * N - 1; i++) {
    if (tiles[i] !== i) return;
  }

  if (tiles[N * N - 1] === null) {
    stopTimer();

    const elapsed = (Date.now() - startTime) / 1000;
    const modeName = `${N}x${N}`;

    onPuzzleClear(modeName, elapsed, moves, currentImage);
  }
}

/* イベント */
sizeSelect.addEventListener("change", () => {
  N = parseInt(sizeSelect.value, 10);
  initTiles();
  renderBoard();
  displayBestRecord(`${N}x${N}`, currentImage);
});

shuffleBtn.addEventListener("click", () => {
  resetTimer();
  resetMoves();
  startTimer();
  shuffleTiles();
});

assistPreview.addEventListener("change", renderBoard);
assistOverlay.addEventListener("change", renderBoard);
assistHighlight.addEventListener("change", renderBoard);

imageInput.addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  resetTimer();
  resetMoves();

  const reader = new FileReader();
  reader.onload = () => {
    currentImage = reader.result;
    previewImage.src = currentImage;
    loadImageInfo(currentImage);
    initTiles();
    renderBoard();
    displayBestRecord(`${N}x${N}`, currentImage); // 自由画像は常に記録なし
  };
  reader.readAsDataURL(file);
});

/* プリセット画像 */
presetSelector.addEventListener("change", (e) => {
  const img = e.target.value;
  if (!img) return;

  resetTimer();
  resetMoves();

  currentImage = img;
  previewImage.src = img;
  loadImageInfo(img);
  initTiles();
  renderBoard();
  displayBestRecord(`${N}x${N}`, currentImage);
});

window.addEventListener("resize", renderBoard);

/* ★ 記録キー生成（自由画像は記録なし） */
function getRecordKey(mode, imageName) {
  if (imageName && imageName.startsWith("preset")) {
    return `bestRecord_${mode}_${imageName}`;
  }
  return null; // 自由画像は記録なし
}

/* 記録保存 */
function saveBestRecord(mode, time, moves, nickname, imageName) {
  const key = getRecordKey(mode, imageName);
  if (!key) return false; // 自由画像は保存しない

  const existing = JSON.parse(localStorage.getItem(key));

  if (!existing || time < existing.time) {
    const record = {
      mode,
      time,
      moves,
      nickname: nickname || "Player1",
      image: imageName
    };
    localStorage.setItem(key, JSON.stringify(record));
    return true;
  }
  return false;
}

/* 記録読み込み */
function loadBestRecord(mode, imageName) {
  const key = getRecordKey(mode, imageName);
  if (!key) return null; // 自由画像は常に記録なし
  return JSON.parse(localStorage.getItem(key));
}

/* 記録表示 */
function displayBestRecord(mode, imageName) {
  const record = loadBestRecord(mode, imageName);
  const area = document.getElementById("bestRecordArea");

  console.log("displayBestRecord called:", mode, imageName, record);

  if (!area) {
    console.warn("bestRecordArea が見つかりません");
    return;
  }

  if (!record) {
    area.textContent = "記録なし / No record yet";
    console.log("→ 記録なしを表示しました");
    return;
  }

  area.innerHTML = `
    <div>【最高記録 / Best Record】</div>
    <div>画像 / Image：${record.image}</div>
    <div>モード / Mode：${record.mode}</div>
    <div>時間 / Time：${record.time.toFixed(2)} 秒</div>
    <div>手数 / Moves：${record.moves}</div>
    <div>ニックネーム / Nickname：${record.nickname}</div>
  `;
  console.log("→ 記録を表示しました");
}



/* 日本語対応ニックネーム */
function normalizeNickname(name) {
  if (!name) return "";
  return name.replace(/　/g, " ").trim();
}

/* クリア処理 */
function onPuzzleClear(mode, time, moves, imageName) {
  const existing = loadBestRecord(mode, imageName);
  const isNew = (!existing || time < existing.time);

  if (isNew && imageName.startsWith("preset")) {
    alert("🎉 新記録です！\nNew Record!\n\nニックネームを入力してください。");

    let nickname = prompt("ニックネーム / Nickname：");
    nickname = normalizeNickname(nickname);

    if (!nickname) {
      nickname = "Player1";
      alert("ニックネームが入力されなかったため、Player1 として登録しました。");
    }

    saveBestRecord(mode, time, moves, nickname, imageName);
  } else {
    alert("クリアおめでとうございます！\nPuzzle Completed!");
  }

  displayBestRecord(mode, imageName);
}

// ★アクセスカウンタ（CountAPI）
fetch("https://api.countapi.xyz/hit/trky17j3-cmd.github.io-puzzle/visits")
  .then(res => res.json())
  .then(data => {
    document.getElementById("counter").innerText = data.value;
  });
  
/* 初期化 */
window.addEventListener("DOMContentLoaded", () => {
  previewImage.src = currentImage;
  initTiles();
  loadImageInfo(currentImage);
  renderBoard();

  // ページ描画完了後に少し待ってから記録表示
  setTimeout(() => {
    displayBestRecord(`${N}x${N}`, currentImage);
  }, 500);
});



</script>


</body>
</html>
